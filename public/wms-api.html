  "info": {
    "title": "WMS API",
    "description": "창고 관리 시스템 (Warehouse Management System) API",
    "version": "1.0.0",
    "contact": {}
  },
  "tags": [],
  "servers": [],
  "components": {
    "schemas": {
      "AdjustStockDto": {
        "type": "object",
        "properties": {
          "skuId": {
            "type": "string",
            "description": "SKU ID"
          },
          "warehouseId": {
            "type": "string",
            "description": "창고 ID"
          },
          "locationId": {
            "type": "string",
            "description": "위치 ID"
          },
          "delta": {
            "type": "number",
            "description": "변경할 수량(양수=가산, 음수=감산)"
          },
          "reason": {
            "type": "string",
            "description": "조정 사유"
          }
        },
        "required": [
          "skuId",
          "warehouseId",
          "delta",
          "reason"
        ]
      },
      "CreateSkuDto": {
        "type": "object",
        "properties": {
          "masterId": {
            "type": "string",
            "description": "기존 마스터 ID (지정 시 사용)"
          },
          "masterName": {
            "type": "string",
            "description": "새 마스터 이름 (masterId 미지정 시 자동 생성용)"
          },
          "name": {
            "type": "string",
            "description": "SKU 이름 (수동 매칭 시 직접 입력, 자동 매칭 시 PIM 정보로 자동 생성)"
          },
          "optionKey": {
            "type": "object",
            "description": "옵션 조합 키 (예: {\"색상\":\"퍼플\",\"용량\":\"256GB\"})"
          },
          "source": {
            "type": "string",
            "description": "SKU 생성 맥락",
            "enum": [
              "auto_matching",
              "manual_matching",
              "manual_entry"
            ]
          },
          "productName": {
            "type": "string",
            "description": "PIM 상품 이름 (자동 매칭 시 SKU 이름 생성에 사용)"
          },
          "variantName": {
            "type": "string",
            "description": "PIM Variant 이름 (자동 매칭 시 SKU 이름 생성에 사용)"
          },
          "deliveryProfileId": {
            "type": "string",
            "description": "배송 프로필 ID",
            "example": "a1b2c3d4-e5f6-7890-1234-567890abcdef"
          },
          "sale1m": {
            "type": "number",
            "description": "최근 1개월 판매량",
            "example": 100
          },
          "sale3m": {
            "type": "number",
            "description": "최근 3개월 판매량",
            "example": 250
          },
          "supplierIds": {
            "description": "공급사 ID 목록",
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "categoryIds": {
            "description": "카테고리 ID 목록",
            "type": "array",
            "items": {
              "type": "string"
            }
          }
        },
        "required": [
          "name"
        ]
      },
      "BarcodeDto": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string"
          },
          "barcode": {
            "type": "string"
          },
          "barcodeType": {
            "type": "string"
          },
          "packingUnit": {
            "type": "string"
          }
        },
        "required": [
          "id",
          "barcode",
          "barcodeType"
        ]
      },
      "SkuResponseDto": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string"
          },
          "name": {
            "type": "string"
          },
          "code": {
            "type": "string"
          },
          "defaultBarcode": {
            "type": "string"
          },
          "deliveryProfileId": {
            "type": "string"
          },
          "sale1m": {
            "type": "number"
          },
          "sale3m": {
            "type": "number"
          },
          "masterId": {
            "type": "string"
          },
          "optionKey": {
            "type": "object"
          },
          "master": {
            "type": "object"
          },
          "barcodes": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/BarcodeDto"
            }
          },
          "supplierNames": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "categoryNames": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "createdAt": {
            "format": "date-time",
            "type": "string"
          },
          "updatedAt": {
            "format": "date-time",
            "type": "string"
          }
        },
        "required": [
          "id",
          "name",
          "code",
          "masterId",
          "barcodes",
          "supplierNames",
          "categoryNames",
          "createdAt",
          "updatedAt"
        ]
      },
      "UpdateSkuDto": {
        "type": "object",
        "properties": {}
      },
      "AddBarcodeDto": {
        "type": "object",
        "properties": {
          "barcode": {
            "type": "string",
            "description": "바코드 값"
          },
          "barcodeType": {
            "type": "string",
            "description": "바코드 타입",
            "enum": [
              "standard"
            ],
            "default": "standard"
          },
          "packingUnit": {
            "type": "string",
            "description": "포장 단위"
          }
        },
        "required": [
          "barcode",
          "barcodeType"
        ]
      },
      "SkuStockSummaryDto": {
        "type": "object",
        "properties": {
          "skuId": {
            "type": "string"
          },
          "skuName": {
            "type": "string"
          },
          "skuCode": {
            "type": "string"
          },
          "totalRealQuantity": {
            "type": "number"
          },
          "totalReservedQuantity": {
            "type": "number"
          },
          "totalAvailableQuantity": {
            "type": "number"
          },
          "warehouseStocks": {
            "description": "창고별 재고 현황",
            "type": "array",
            "items": {
              "type": "string"
            }
          }
        },
        "required": [
          "skuId",
          "skuName",
          "skuCode",
          "totalRealQuantity",
          "totalReservedQuantity",
          "totalAvailableQuantity",
          "warehouseStocks"
        ]
      },
      "CreateWarehouseDto": {
        "type": "object",
        "properties": {
          "name": {
            "type": "string",
            "description": "창고 이름"
          },
          "type": {
            "type": "string",
            "description": "창고 타입",
            "enum": [
              "domestic",
              "overseas",
              "bonded",
              "return"
            ],
            "default": "domestic"
          },
          "location": {
            "type": "string",
            "description": "창고 위치"
          }
        },
        "required": [
          "name",
          "type"
        ]
      },
      "UpdateWarehouseDto": {
        "type": "object",
        "properties": {
          "name": {
            "type": "string",
            "description": "창고 이름"
          },
          "type": {
            "type": "string",
            "description": "창고 타입",
            "enum": [
              "domestic",
              "overseas",
              "bonded",
              "return"
            ],
            "default": "domestic"
          },
          "location": {
            "type": "string",
            "description": "창고 위치"
          }
        }
      },
      "SkuMappingDto": {
        "type": "object",
        "properties": {
          "skuId": {
            "type": "string",
            "description": "SKU ID"
          },
          "quantity": {
            "type": "number",
            "description": "수량",
            "minimum": 1,
            "default": 1
          }
        },
        "required": [
          "skuId",
          "quantity"
        ]
      },
      "StockPolicyDto": {
        "type": "object",
        "properties": {
          "inventoryManagement": {
            "type": "boolean",
            "description": "재고 관리 여부 (true: 물리적 재고, false: 디지털)",
            "default": true
          },
          "preStockSellable": {
            "type": "boolean",
            "description": "재고 0이어도 선판매 가능 여부",
            "default": true
          },
          "alwaysSellableZeroStock": {
            "type": "boolean",
            "description": "재고 0이어도 항상 판매 가능 (직배/신상품)",
            "default": false
          }
        },
        "required": [
          "inventoryManagement",
          "preStockSellable",
          "alwaysSellableZeroStock"
        ]
      },
      "ResolveMatchingDto": {
        "type": "object",
        "properties": {
          "skuIds": {
            "description": "매칭될 SKU ID 목록 (matched 상태일 경우 최소 하나 이상의 UUID 필수)",
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "skuMappings": {
            "description": "매칭될 SKU와 수량 정보 목록 (수동 매칭 시 수량 지정 필요한 경우)",
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/SkuMappingDto"
            }
          },
          "ignore": {
            "type": "boolean",
            "description": "매칭을 무시할지 여부 (true인 경우 ignored 상태로 전환)"
          },
          "strategy": {
            "type": "string",
            "description": "매칭 전략",
            "enum": [
              "void",
              "variant",
              "option"
            ],
            "default": "variant"
          },
          "stockPolicy": {
            "description": "재고 정책 설정",
            "allOf": [
              {
                "$ref": "#/components/schemas/StockPolicyDto"
              }
            ]
          },
          "isGift": {
            "type": "boolean",
            "description": "사은품 여부",
            "default": false
          }
        },
        "required": [
          "ignore",
          "strategy",
          "stockPolicy",
          "isGift"
        ]
      },
      "OptionMappingDto": {
        "type": "object",
        "properties": {
          "optionName": {
            "type": "string",
            "description": "옵션 이름 (예: CPU, RAM)"
          },
          "optionValue": {
            "type": "string",
            "description": "옵션 값 (예: i7, 16GB)"
          },
          "skuId": {
            "type": "string",
            "description": "매칭될 SKU ID"
          }
        },
        "required": [
          "optionName",
          "optionValue",
          "skuId"

      },
      "ResolveOptionMatchingDto": {

          }
        },
        "required": [
          "optionMappings"
        ]
      },
      "SetMatchingPriorityDto": {
        "type": "object",
        "properties": {

            "type": "string",

        "required": [
          "priority"
        ]

      "ChangeStrategyDto": {
        "type": "object",
        "properties": {

            "type": "string",

              "void",

              "option"
            ]

        },
        "required": [
          "strategy"

      "SelectedOptionDto": {
        "type": "object",
        "properties": {
          "optionName": {
            "type": "string",
            "description": "옵션 이름"
          },
          "optionValue": {
            "type": "string",
            "description": "선택된 옵션 값"
          }
        },
        "required": [
          "optionName",
          "optionValue"
        ]
      },
      "VariantSkuLookupDto": {
        "type": "object",
        "properties": {
          "selectedOptions": {
            "description": "선택된 옵션 목록 (옵션별 매칭인 경우 필수)",

            "items": {
              "$ref": "#/components/schemas/SelectedOptionDto"
            }
          }
        }
      },
      "CreateColumnDto": {
        "type": "object",

          "displayOrder": {
